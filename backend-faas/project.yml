# DigitalOcean Functions Project Configuration
# NOTE: Cron expressions use UTC. AWST (Australia/Perth) = UTC+8, no DST.
# To convert: UTC_time = AWST_time - 8 (mod 24)
# e.g., 3 AM AWST = 19:00 UTC previous day

packages:
  - name: api
    functions:
      games:
        handler: packages/api/games/__init__.py
        runtime: python:3
        web: true
        limits:
          timeout: 300000   # 5 minutes — generous for API requests
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
        annotations:
          require-whisk-auth: false
      tips:
        handler: packages/api/tips/__init__.py
        runtime: python:3
        web: true
        limits:
          timeout: 300000   # 5 minutes — generous for API requests
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
        annotations:
          require-whisk-auth: false
      backtest:
        handler: packages/api/backtest/__init__.py
        runtime: python:3
        web: true
        limits:
          timeout: 300000   # 5 minutes — generous for API requests
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
        annotations:
          require-whisk-auth: false
      admin:
        handler: packages/api/admin/__init__.py
        runtime: python:3
        web: true
        limits:
          timeout: 300000   # 5 minutes — generous for API requests
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          ADMIN_API_KEY: ${ADMIN_API_KEY}
        annotations:
          require-whisk-auth: false

  - name: cron
    functions:
      daily-sync:
        handler: packages/cron/daily-sync/__init__.py
        runtime: python:3
        web: false
        limits:
          timeout: 600000   # 10 minutes — sync can take a while during season
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          SQUIGGLE_API_BASE: ${SQUIGGLE_API_BASE}
          SQUIGGLE_CONTACT_EMAIL: ${SQUIGGLE_CONTACT_EMAIL}
        triggers:
          daily-sync-trigger:
            type: schedule
            cron: "*/15 * * * *"
      match-completion:
        handler: packages/cron/match-completion/__init__.py
        runtime: python:3
        web: false
        limits:
          timeout: 600000   # 10 minutes
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          SQUIGGLE_API_BASE: ${SQUIGGLE_API_BASE}
          SQUIGGLE_CONTACT_EMAIL: ${SQUIGGLE_CONTACT_EMAIL}
        triggers:
          match-completion-trigger:
            type: schedule
            cron: "5,20,35,50 * * * *"
      tip-generation:
        handler: packages/cron/tip-generation/__init__.py
        runtime: python:3
        web: false
        limits:
          timeout: 900000   # 15 minutes — max allowed, tip gen includes AI calls
          memory: 512       # 512 MB — heavier processing with ML + AI
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
          OPENROUTER_MODEL: ${OPENROUTER_MODEL}
        triggers:
          tip-generation-trigger:
            type: schedule
            cron: "0 19 * * *"    # 19:00 UTC = 03:00 AWST
      historic-refresh:
        handler: packages/cron/historic-refresh/__init__.py
        runtime: python:3
        web: false
        limits:
          timeout: 900000   # 15 minutes — max allowed, will be restructured to fit
          memory: 512       # 512 MB — batch processing of 16 seasons
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          SQUIGGLE_API_BASE: ${SQUIGGLE_API_BASE}
          SQUIGGLE_CONTACT_EMAIL: ${SQUIGGLE_CONTACT_EMAIL}
          OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
          OPENROUTER_MODEL: ${OPENROUTER_MODEL}
        triggers:
          historic-refresh-trigger:
            type: schedule
            cron: "0 20 * * 6"    # 20:00 UTC Saturday = 04:00 AWST Sunday

environment:
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  SQUIGGLE_API_BASE: ${SQUIGGLE_API_BASE}
  SQUIGGLE_CONTACT_EMAIL: ${SQUIGGLE_CONTACT_EMAIL}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
  ADMIN_API_KEY: ${ADMIN_API_KEY}
  ENVIRONMENT: ${ENVIRONMENT}
