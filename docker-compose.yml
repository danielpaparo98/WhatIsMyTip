# ──────────────────────────────────────────────────────────────────────
# WhatIsMyTip local Docker Compose stack.
#
# Two networks are defined for least-privilege: `backend_net` carries
# api/init-data/postgres/redis traffic; `frontend_net` carries
# frontend ↔ api traffic.  Postgres and Redis are NOT reachable from
# the frontend container.
#
# Quick start
# -----------
#   docker compose up -d            # start everything (builds on first run)
#   docker compose logs -f init-data  # watch the init step
#   docker compose logs -f api        # watch the API
#   curl http://localhost:8000/health
#   open http://localhost:3000
#
#   docker compose down -v
#
# SECURITY (SEC-LO-009)
# ---------------------
# The ``api`` service ships with a **dev-only** ``ADMIN_API_KEY``
# default of ``dev_admin_key_change_me`` (clearly marked as a
# placeholder).  This is **ONLY** intended for local development
# under ``ENVIRONMENT=development``; the FastAPI lifespan code
# refuses to start when ``ADMIN_API_KEY`` is unset and
# ``ENVIRONMENT != development``, so accidentally pointing this
# compose file at a production deployment without setting a real
# secret fails closed at boot rather than running with a known
# admin key.  See ``app/core/lifespan.py`` for the check and
# ``docs/security.md`` for the full policy.
#
# Notes
# -----
#   * The user is on Windows + PowerShell; bind-mounts use relative
#     paths so the same compose file works on Windows / macOS / Linux.
#   * ``init-data`` uses the API image (multi-stage, already built in
#     Phase 4) and only overrides the entrypoint.  This avoids baking
#     a second image and keeps the migration story identical to
#     production.
#   * For podman users: ``podman compose up`` works against this file
#     without changes (podman compose reads docker-compose.yml).
# ──────────────────────────────────────────────────────────────────────

name: whatismytip

# ── Networks ──────────────────────────────────────────────────────────
# backend_net: api ↔ init-data ↔ postgres ↔ redis
# frontend_net: api ↔ frontend
networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: wimt-postgres
    environment:
      POSTGRES_USER: wimt
      POSTGRES_PASSWORD: wimt_dev_password
      POSTGRES_DB: whatismytip
    volumes:
      - wimt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wimt -d whatismytip"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - backend_net
    # Hardening
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    shm_size: 128m
    # No `ports:` — postgres is reachable only via backend_net.
    # To connect from the host (psql, TablePlus, etc.) for local
    # debugging, run `docker compose port postgres 5432` after
    # `docker compose up` and use the published port.

  redis:
    image: redis:7-alpine
    container_name: wimt-redis
    volumes:
      - wimt_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - backend_net
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 0.5
    # No `ports:` — see postgres above.

  # One-shot init container: runs Alembic migrations, then (optionally)
  # loads CSV data from the bind-mounted ./data directory.  Exits 0
  # on success; `api` waits for it via service_completed_successfully.
  init-data:
    build:
      context: backend
      dockerfile: Dockerfile
    image: whatismytip-api:local
    container_name: wimt-init
    command:
      - sh
      - -c
      - >-
        if [ "$$WIMT_INIT_MODE" = "seed" ]; then
        echo "[init-data] WIMT_INIT_MODE=seed -> running synthetic seeder";
        python scripts/migrate_and_seed.py --verbose;
        else
        echo "[init-data] WIMT_INIT_MODE=csv -> loading CSVs from /data";
        python scripts/migrate_and_seed.py --from-csv --csv-dir=/data --no-seed --verbose;
        fi
    environment:
      DATABASE_URL: postgresql+asyncpg://wimt:wimt_dev_password@postgres:5432/whatismytip
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      WIMT_INIT_MODE: ${WIMT_INIT_MODE:-csv}
    volumes:
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    networks:
      - backend_net
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp

  api:
    image: whatismytip-api:local
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: wimt-api
    ports:
      - "8000:8000"
    mem_limit: 1g
    cpus: 2.0
    cap_drop:
      - ALL
    environment:
      # DATABASE_URL comes from .env when present, with a sensible
      # default for the compose network.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wimt:wimt_dev_password@postgres:5432/whatismytip}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000
      # SEC-LO-009: dev-only default.  The FastAPI lifespan
      # (``app.core.lifespan``) refuses to start the app when this
      # env var is empty AND ``ENVIRONMENT`` is not ``development``,
      # so this placeholder cannot accidentally be used in a
      # production deployment.  See docker-compose.yml header note
      # for the full policy.
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev_admin_key_change_me}
      ENVIRONMENT: development
      # Disable the in-process APScheduler cron jobs during local dev
      # so the API doesn't fire background syncs every 15 minutes.
      # Re-enable with CRON_ENABLED=true to exercise the cron paths.
      CRON_ENABLED: "false"
      LOG_FORMAT: plain
    volumes:
      # Overlay the WHOLE backend on /app so --reload watches
      # main.py, app/, packages/, and scripts/ (not just the
      # partial /app/backend tree).
      - ./backend:/app
    depends_on:
      init-data:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    restart: unless-stopped
    networks:
      - backend_net
      - frontend_net
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp
      - /app/.cache

  frontend:
    # Pin the bun version that matches the committed bun.lockb
    # (lockfile generated with bun 1.3.x).  Floats are not safe.
    image: oven/bun:1.3.6
    container_name: wimt-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    mem_limit: 512m
    cpus: 1.0
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000
      NODE_ENV: development
    volumes:
      - ./frontend:/app
    command:
      - sh
      - -c
      - "bun install --frozen && bun run dev --host 0.0.0.0"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - frontend_net
    security_opt:
      - "no-new-privileges:true"

volumes:
  wimt_postgres_data:
  wimt_redis_data:
