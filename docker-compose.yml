# ──────────────────────────────────────────────────────────────────────
# WhatIsMyTip local Docker Compose stack.
#
# Phase 6 brings the FastAPI reimplementation, Postgres, Redis, and the
# Nuxt frontend up under a single `docker compose up` so the whole
# stack can be exercised locally with real data.
#
# Components
# ----------
#   postgres   – PostgreSQL 16 (alpine) with a persistent named volume
#   redis      – Redis 7 (alpine) with a persistent named volume
#   init-data  – one-shot init container.  Built from the same image as
#                the API; runs Alembic migrations + (optionally) loads
#                CSV data from the bind-mounted ``./data`` directory.
#                Exits 0 on success; ``api`` waits for it via
#                ``service_completed_successfully``.
#   api        – the FastAPI application (binds ./backend for hot
#                reload) on http://localhost:8000
#   frontend   – Nuxt 4 dev server on http://localhost:3000
#
# Quick start
# -----------
#   # from the project root:
#   docker compose up -d            # start everything (builds on first run)
#   docker compose logs -f init-data  # watch the init step
#   docker compose logs -f api        # watch the API
#   curl http://localhost:8000/health
#   open http://localhost:3000
#
#   # tear it all down (including the database volume):
#   docker compose down -v
#
# Notes
# -----
#   * The user is on Windows + PowerShell; bind-mounts use relative
#     paths so the same compose file works on Windows / macOS / Linux.
#   * ``init-data`` uses the API image (multi-stage, already built in
#     Phase 4) and only overrides the entrypoint.  This avoids baking
#     a second image and keeps the migration story identical to
#     production.
#   * For podman users: ``podman compose up`` works against this file
#     without changes (podman compose reads docker-compose.yml).
# ──────────────────────────────────────────────────────────────────────

name: whatismytip

services:
  postgres:
    image: postgres:16-alpine
    container_name: wimt-postgres
    environment:
      POSTGRES_USER: wimt
      POSTGRES_PASSWORD: wimt_dev_password
      POSTGRES_DB: whatismytip
    ports:
      - "5432:5432"
    volumes:
      - wimt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wimt -d whatismytip"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wimt-redis
    ports:
      - "6379:6379"
    volumes:
      - wimt_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot init container: runs Alembic migrations, then (optionally)
  # loads CSV data from the bind-mounted ./data directory.  Exits 0
  # on success; ``api`` waits for it via service_completed_successfully.
  #
  # WIMT_INIT_MODE toggle (env var, default: csv):
  #   csv   - load real scraped CSVs from /data (default; used in prod-like
  #           local runs once ``scripts/make-data.sh`` has produced data).
  #   seed  - run the synthetic offline seeder (``--seed``) which populates
  #           the DB from ``backend/seed_data``.  Use this when you want a
  #           fast end-to-end test without waiting for the scraper.
  init-data:
    build:
      context: backend
      dockerfile: Dockerfile
    image: whatismytip-api:local
    container_name: wimt-init
    command:
      - sh
      - -c
      - >-
        if [ "$$WIMT_INIT_MODE" = "seed" ]; then
        echo "[init-data] WIMT_INIT_MODE=seed -> running synthetic seeder";
        python scripts/migrate_and_seed.py --seed --verbose;
        else
        echo "[init-data] WIMT_INIT_MODE=csv -> loading CSVs from /data";
        python scripts/migrate_and_seed.py --from-csv --csv-dir=/data --no-seed --verbose;
        fi
    environment:
      DATABASE_URL: postgresql+asyncpg://wimt:wimt_dev_password@postgres:5432/whatismytip
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      WIMT_INIT_MODE: ${WIMT_INIT_MODE:-csv}
    volumes:
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  api:
    image: whatismytip-api:local
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: wimt-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://wimt:wimt_dev_password@postgres:5432/whatismytip
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000
      ADMIN_API_KEY: dev_admin_key_change_me
      ENVIRONMENT: development
      # Disable the in-process APScheduler cron jobs during local dev
      # so the API doesn't fire background syncs every 15 minutes.
      # Re-enable with CRON_ENABLED=true to exercise the cron paths.
      CRON_ENABLED: "false"
      LOG_FORMAT: plain
    volumes:
      - ./backend:/app/backend
    depends_on:
      init-data:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    restart: unless-stopped

  frontend:
    image: oven/bun:1.1
    container_name: wimt-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - wimt_bun_cache:/root/.bun
      - wimt_nuxt_cache:/app/.nuxt
      - wimt_nuxt_output:/app/.output
    command:
      - sh
      - -c
      - "bun install --frozen-lockfile && bun run dev --host 0.0.0.0"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  wimt_postgres_data:
  wimt_redis_data:
  wimt_bun_cache:
  wimt_nuxt_cache:
  wimt_nuxt_output:
