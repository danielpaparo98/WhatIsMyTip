name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  test:
    name: Lint + Type Check + Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint || echo "Lint not configured, skipping"

      - name: Run type check
        run: bun run typecheck || echo "Typecheck not configured, skipping"

      - name: Run unit tests
        run: bun run test:unit

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production bundle
        run: bun run build
        env:
          NUXT_PUBLIC_API_BASE: https://whatismytip.com

      - name: Verify build output
        run: |
          if [ ! -d ".output" ]; then
            echo "ERROR: Build did not produce .output directory"
            exit 1
          fi
          echo "✅ Build succeeded, .output directory created"
