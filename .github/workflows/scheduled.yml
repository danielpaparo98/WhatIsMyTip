name: Scheduled Tasks

on:
  schedule:
    # Run every Monday at 9:00 AM UTC (Monday evening in Australia)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  sync-games:
    name: Sync Games from Squiggle
    runs-on: ubuntu-latest
    steps:
      - name: Sync games
        run: |
          curl -X POST "https://api.whatismytip.com/api/sync/games"

  generate-tips:
    name: Generate Weekly Tips
    runs-on: ubuntu-latest
    needs: sync-games
    steps:
      - name: Get current round info
        id: round-info
        run: |
          YEAR=$(date +%Y)
          echo "year=$YEAR" >> $GITHUB_OUTPUT
      
      - name: Generate tips
        run: |
          YEAR=${{ steps.round-info.outputs.year }}
          curl -X POST "https://api.whatismytip.com/api/tips/generate?season=$YEAR&round=1"

  run-backtest:
    name: Run Weekly Backtest
    runs-on: ubuntu-latest
    steps:
      - name: Get current year
        id: year-info
        run: |
          YEAR=$(date +%Y)
          echo "year=$YEAR" >> $GITHUB_OUTPUT
      
      - name: Run backtest
        run: |
          YEAR=${{ steps.year-info.outputs.year }}
          curl -X POST "https://api.whatismytip.com/api/backtest/run?season=$YEAR"
