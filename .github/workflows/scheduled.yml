name: Scheduled Tasks

on:
  schedule:
    # Keep fixtures/results fresh throughout the day
    - cron: '*/15 * * * *'
    # Weekly heavier jobs (tip generation + backtest)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  sync-games:
    name: Sync Games from Squiggle
    runs-on: ubuntu-latest
    steps:
      - name: Sync games
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Api-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.API_BASE_URL }}/api/admin/jobs/daily-sync/trigger")
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "Sync games failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          echo "Sync games completed successfully"

  generate-tips:
    name: Generate Weekly Tips
    runs-on: ubuntu-latest
    needs: sync-games
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * 1'
    steps:
      - name: Get current round info
        id: round-info
        run: |
          YEAR=$(date +%Y)
          echo "year=$YEAR" >> $GITHUB_OUTPUT
      
      - name: Generate tips
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Api-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.API_BASE_URL }}/api/admin/jobs/tip-generation/trigger")
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "Tip generation failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          echo "Tip generation completed successfully"

  run-backtest:
    name: Run Weekly Backtest
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * 1'
    steps:
      - name: Get current year
        id: year-info
        run: |
          YEAR=$(date +%Y)
          echo "year=$YEAR" >> $GITHUB_OUTPUT
      
      - name: Run backtest
        run: |
          YEAR=${{ steps.year-info.outputs.year }}
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.whatismytip.com/api/backtest/run?season=$YEAR")
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "Backtest failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          echo "Backtest completed successfully"
