name: Deploy Backend

# CI concurrency guard: prevent two main deploys racing.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  test:
    name: Run unit tests + lint + type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short -m "not integration"

      - name: Run linter
        run: uv run ruff check .

      - name: Run type checker
        run: uv run mypy packages/ --ignore-missing-imports

  integration-test:
    name: Run integration tests (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: whatismytip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/whatismytip_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: uv run pytest tests/integration/ -v --tb=short -k "test_api_" --timeout=60

  docker-smoke:
    name: Docker build + health smoke test
    runs-on: ubuntu-latest
    needs: integration-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Build the FastAPI image
        run: docker build -t whatismytip-api:ci-smoke -f Dockerfile .

      - name: Run container and verify health endpoint
        run: |
          docker run -d --name smoke-test \
            -p 8000:8000 \
            -e ENVIRONMENT=development \
            -e DATABASE_URL=postgresql+asyncpg://localhost/whatismytip \
            -e REDIS_URL=redis://localhost:6379/0 \
            whatismytip-api:ci-smoke

          # Wait for container to be healthy
          for i in $(seq 1 30); do
            HEALTH=$(curl -sf http://localhost:8000/health 2>/dev/null || echo "failed")
            if [ "$HEALTH" != "failed" ]; then
              echo "Health endpoint responding: $HEALTH"
              docker stop smoke-test
              exit 0
            fi
            sleep 2
          done

          echo "ERROR: Container did not start within 60s"
          docker logs smoke-test
          docker stop smoke-test || true
          exit 1

  deploy:
    name: Deploy to DigitalOcean App Platform
    needs: [test, integration-test, docker-smoke]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://whatismytip.com
    defaults:
      run:
        working-directory: backend
    env:
      DO_REGISTRY: registry.digitalocean.com/whatismytip
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.DO_REGISTRY }}/api:${{ env.IMAGE_TAG }} -f Dockerfile .
          docker push ${{ env.DO_REGISTRY }}/api:${{ env.IMAGE_TAG }}

      - name: Trigger App Platform deployment
        env:
          DO_APP_ID: ${{ secrets.DO_APP_ID }}
        run: |
          DEPLOYMENT_ID=$(doctl apps create-deployment "$DO_APP_ID" --format ID --no-header)
          echo "Triggered deployment: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        env:
          DO_APP_ID: ${{ secrets.DO_APP_ID }}
        run: |
          for i in $(seq 1 50); do
            STATUS=$(doctl apps get-deployment "$DO_APP_ID" "$DEPLOYMENT_ID" --format Phase --no-header 2>/dev/null || echo "unknown")
            echo "Deployment status: $STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "Deployment is active"
              exit 0
            fi
            if [ "$STATUS" = "ERROR" ]; then
              echo "ERROR: Deployment failed"
              exit 1
            fi
            sleep 12
          done
          echo "ERROR: Deployment timed out after 10 minutes"
          exit 1

      - name: Smoke test production health endpoint
        run: |
          for i in $(seq 1 30); do
            HEALTH=$(curl -sf https://whatismytip.com/health 2>/dev/null || echo "failed")
            if [ "$HEALTH" != "failed" ]; then
              STATUS=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Production health check passed (status: $STATUS)"
                exit 0
              fi
              echo "Health endpoint returned but status=$STATUS"
            fi
            sleep 10
          done
          echo "❌ Production health check failed after 5 minutes" >&2
          echo "Manual rollback required:" >&2
          echo "  doctl apps list-deployments ${{ secrets.DO_APP_ID }}" >&2
          echo "  doctl apps rollback ${{ secrets.DO_APP_ID }}" >&2
          exit 1
