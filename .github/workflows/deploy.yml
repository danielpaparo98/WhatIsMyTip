name: Deploy Backend

# CI concurrency guard (HI-010): prevent two `main` deploys racing.
# With `cancel-in-progress: false` the second push waits for the
# first to finish, so we always deploy sequentially and the
# `IMAGE_TAG` of the live revision is always knowable.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  test:
    name: Run unit tests + lint + type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      # The unit suite excludes integration tests by design (they
      # require a live PostgreSQL + Redis).  We use ``-q`` to keep
      # the CI log short and ``--ignore`` any DB-dependent tests
      # (e.g. anything marked ``@pytest.mark.integration``).
      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short -m "not integration"

      - name: Run linter
        run: uv run ruff check .

      - name: Run type checker
        run: uv run mypy packages/ --ignore-missing-imports

  docker-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Build the FastAPI image
        # Builds the multi-stage Dockerfile and discards the result —
        # the real push is done by ``backend/scripts/deploy.sh`` on
        # the deploy job.  This is a fast smoke test to catch
        # Dockerfile / dependency issues before they hit production.
        run: docker build -t whatismytip-api:ci-smoke -f Dockerfile .

  deploy:
    name: Container deploy to App Platform
    needs: [test, docker-smoke]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://whatismytip.com
    defaults:
      run:
        working-directory: backend
    env:
      DO_REGISTRY: registry.digitalocean.com/whatismytip
      IMAGE_TAG: ${{ github.sha }}
      SKIP_TESTS: "1"   # tests already ran in the test job
      SKIP_MIGRATE: "1" # migrations run as their own one-off workflow
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      # NOTE (ME-013): DATABASE_URL / REDIS_URL / OPENROUTER_API_KEY
      # / CORS_ORIGINS / LOG_FORMAT / etc. are NOT injected here.
      # They live on the App Platform service spec (via the App
      # Platform UI or `doctl apps update --env ...`) and are bound
      # to the running container, not the deploy script.
      - name: Run deploy.sh (build + push + trigger App Platform)
        env:
          DO_APP_ID: ${{ secrets.DO_APP_ID }}
          APP_URL: https://whatismytip.com
        run: bash ./scripts/deploy.sh

      # CR-004: smoke step now FAILS the workflow on health-check
      # miss.  The previous version always `exit 0` which masked
      # broken deploys.  deploy.sh still polls /health internally
      # (with a 5-minute window); this is a backstop.
      - name: Smoke test the new deployment
        run: |
          for i in $(seq 1 20); do
            if curl -fsSL https://whatismytip.com/health; then
              echo "✅ /health OK"
              exit 0
            fi
            sleep 6
          done
          echo "❌ /health did not return 2xx within 120s" >&2
          echo "Manual rollback required:" >&2
          echo "  doctl apps list-deployments ${{ secrets.DO_APP_ID }}" >&2
          echo "  doctl apps rollback ${{ secrets.DO_APP_ID }} --deployment-id <previous-id>" >&2
          exit 1
