name: Deploy FaaS Backend

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend-faas/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-faas
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Run linter
        run: uv run ruff check .

      - name: Run type checker
        run: uv run mypy packages/ --ignore-missing-imports

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend-faas
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # NOTE: Environment variables (DATABASE_URL, REDIS_URL, OPENAI_API_KEY, etc.)
      # must be configured at the namespace level via the DigitalOcean dashboard
      # or using `doctl serverless namespaces env-vars`. They are NOT set by this
      # workflow to avoid exposing secrets in CI logs. If a new env var is added,
      # update the namespace configuration accordingly.
      #
      # To set namespace env vars from CI:
      #   doctl serverless namespaces env-vars set --database-url="${{ secrets.DATABASE_URL }}" ...
      # See: https://docs.digitalocean.com/products/functions/how-to/use-environment-variables/

      - name: Deploy functions
        run: doctl serverless deploy .

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          uv sync
          uv run alembic upgrade head
