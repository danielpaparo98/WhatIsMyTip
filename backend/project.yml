# DigitalOcean Functions Project Configuration
#
# ── Cron Timezone Notice ────────────────────────────────────────────────
# DO Functions cron triggers fire in UTC ONLY.  All cron expressions below
# are already converted from Australia/Perth (AWST, UTC+8) to UTC:
#
#   Function              AWST           UTC           Expression
#   ═══════════════      ───────        ───────        ──────────────
#   daily-sync             N/A            N/A           */15 * * * *
#   match-completion       N/A            N/A           5,20,35,50 * * * *
#   tip-generation         03:00 daily    19:00 daily    0 19 * * *
#   historic-refresh       04:00 Sunday   20:00 Sat      0 20 * * 6
#
# Australia/Perth does not observe DST, so this mapping is fixed year-round.
# To convert AWST to UTC:  UTC_time = AWST_time - 8 (mod 24).
# ───────────────────────────────────────────────────────────────────────

packages:
  - name: api
    functions:
      - name: games
        handler: packages/api/games/__init__.py
        runtime: python:3
        web: true
        limits:
          timeout: 300000   # 5 minutes — generous for API requests
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
        annotations:
          require-whisk-auth: false
      - name: tips
        handler: packages/api/tips/__init__.py
        runtime: python:3
        web: true
        limits:
          timeout: 300000   # 5 minutes — generous for API requests
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
        annotations:
          require-whisk-auth: false
      - name: backtest
        handler: packages/api/backtest/__init__.py
        runtime: python:3
        web: true
        limits:
          timeout: 300000   # 5 minutes — generous for API requests
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
        annotations:
          require-whisk-auth: false
      - name: admin
        handler: packages/api/admin/__init__.py
        runtime: python:3
        web: true
        limits:
          timeout: 300000   # 5 minutes — generous for API requests
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          ADMIN_API_KEY: ${ADMIN_API_KEY}
        annotations:
          require-whisk-auth: false

  - name: cron
    functions:
      - name: daily-sync
        handler: packages/cron/daily-sync/__init__.py
        runtime: python:3
        web: false
        limits:
          timeout: 600000   # 10 minutes — sync can take a while during season
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          SQUIGGLE_API_BASE: ${SQUIGGLE_API_BASE}
          SQUIGGLE_CONTACT_EMAIL: ${SQUIGGLE_CONTACT_EMAIL}
        triggers:
          - name: daily-sync-trigger
            type: schedule
            cron: "*/15 * * * *"
      - name: match-completion
        handler: packages/cron/match-completion/__init__.py
        runtime: python:3
        web: false
        limits:
          timeout: 600000   # 10 minutes
          memory: 256       # 256 MB
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          SQUIGGLE_API_BASE: ${SQUIGGLE_API_BASE}
          SQUIGGLE_CONTACT_EMAIL: ${SQUIGGLE_CONTACT_EMAIL}
        triggers:
          - name: match-completion-trigger
            type: schedule
            cron: "5,20,35,50 * * * *"
      - name: tip-generation
        handler: packages/cron/tip-generation/__init__.py
        runtime: python:3
        web: false
        limits:
          timeout: 900000   # 15 minutes — max allowed, tip gen includes AI calls
          memory: 512       # 512 MB — heavier processing with ML + AI
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
          OPENROUTER_MODEL: ${OPENROUTER_MODEL}
        triggers:
          - name: tip-generation-trigger
            type: schedule
            cron: "0 19 * * *"    # 19:00 UTC = 03:00 AWST
      - name: historic-refresh
        handler: packages/cron/historic-refresh/__init__.py
        runtime: python:3
        web: false
        limits:
          timeout: 900000   # 15 minutes — max allowed, will be restructured to fit
          memory: 512       # 512 MB — batch processing of 16 seasons
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          SQUIGGLE_API_BASE: ${SQUIGGLE_API_BASE}
          SQUIGGLE_CONTACT_EMAIL: ${SQUIGGLE_CONTACT_EMAIL}
          OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
          OPENROUTER_MODEL: ${OPENROUTER_MODEL}
        triggers:
          - name: historic-refresh-trigger
            type: schedule
            cron: "0 20 * * 6"    # 20:00 UTC Saturday = 04:00 AWST Sunday

environment:
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  SQUIGGLE_API_BASE: ${SQUIGGLE_API_BASE}
  SQUIGGLE_CONTACT_EMAIL: ${SQUIGGLE_CONTACT_EMAIL}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
  ADMIN_API_KEY: ${ADMIN_API_KEY}
  ENVIRONMENT: ${ENVIRONMENT}
