# ──────────────────────────────────────────────────────────────────────
# nginx config for whatismytip-proxy.
#
# The public ingress (App Platform) routes `/api/...` to this service on
# port 8080.  We forward those requests to the DigitalOcean Functions
# (Apache OpenWhisk) gateway over HTTPS.
#
# ── DO Functions web-action URL format ──────────────────────────────────
# DigitalOcean Functions web actions are publicly accessible at:
#
#   https://<API_HOST>/api/v1/web/<NAMESPACE_ID>/<package>/<action>[/<path>]
#
# For this app:
#   API_HOST  = faas-syd1-c274eac6.doserverless.co
#   NAMESPACE = fn-2e7dadfb-b216-4472-a2d3-38993922a0ff
#   package   = api
#   action    = games | tips | backtest | admin
#
# So a health-check request arriving as:
#   Public URL:          /api/games/health
#   After ingress strip: /games/health        (App Platform drops the /api prefix)
#   Upstream target:     /api/v1/web/${FUNCTION_NAMESPACE}/api/games/health
#
# ── About path stripping ────────────────────────────────────────────────
# App Platform's top-level ingress `prefix` match strips the matched
# prefix before forwarding to the service component.  Our ingress rule
# matches `/api`, so the proxy receives `/games/health` rather than
# `/api/games/health`.  We reconstruct the full OpenWhisk web-action
# path by prepending `/api/v1/web/${FUNCTION_NAMESPACE}/api`.
#
# ── Previous bug (fixed) ───────────────────────────────────────────────
# The proxy previously used `proxy_pass .../api/api$request_uri` which
# is NOT a valid DO Functions web-action URL — it was missing the
# required `/v1/web/<namespace>` segment, causing the FaaS gateway to
# return 404 for every API request.
#
# ── Environment variables (substituted by envsubst at container start) ──
#   FUNCTION_HOST       default: faas-syd1-c274eac6.doserverless.co
#   FUNCTION_PORT       default: 443
#   FUNCTION_NAMESPACE  default: fn-2e7dadfb-b216-4472-a2d3-38993922a0ff
# ──────────────────────────────────────────────────────────────────────

# Log every request to stdout (so it shows up in `doctl apps logs
# --type run`) — invaluable for debugging routing issues like
# "is the ingress stripping the `/api` prefix?".
# NOTE: `log_format` must be declared in the `http` context (this
# file is included via `include /etc/nginx/conf.d/*.conf;` in the
# main /etc/nginx/nginx.conf, so the top level here IS the http
# context).
log_format proxy_debug '$remote_addr [$time_local] "$request" '
                       '→ $upstream_addr '
                       '$status $body_bytes_sent';

# Upstream: the FaaS gateway.  HTTPS over the public internet.
upstream whatismytip_function {
    server ${FUNCTION_HOST}:${FUNCTION_PORT};
    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;

    # Generous payload limit — the default 1 MiB is too small for some
    # admin endpoints (e.g. bulk backtest data).
    client_max_body_size 10m;

    # Allow long-running requests (e.g. tip generation, historic
    # refresh) — set well above the function component's own timeout
    # so we surface gateway errors rather than connection resets.
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    send_timeout          600s;

    # Standard reverse-proxy headers.
    proxy_http_version 1.1;
    proxy_set_header   Host              ${FUNCTION_HOST};
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # SNI: the FaaS gateway requires SNI to serve the right certificate.
    proxy_ssl_server_name on;
    proxy_ssl_name        ${FUNCTION_HOST};

    # Per-server access log (uses the format defined in the http
    # context above).
    access_log /dev/stdout proxy_debug;

    # Healthcheck for the proxy itself (does NOT go upstream).  Useful
    # for monitoring without hitting the function gateway.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain always;
    }

    # ── Main API forward ─────────────────────────────────────────────
    # Match everything (catches the stripped `/...` form that App
    # Platform forwards after removing the `/api` prefix).
    # Forward to the FaaS gateway at the correct OpenWhisk web-action
    # path: /api/v1/web/${FUNCTION_NAMESPACE}/api$request_uri
    #
    # Example:
    #   Proxy receives:  /games/health
    #   Upstream target: https://faas-syd1-c274eac6.doserverless.co
    #                      /api/v1/web/fn-2e7dadfb-.../api/games/health
    location / {
        # 404 anything that doesn't look like an API call
        if ($request_uri !~ "^/(api/)?[a-z][a-z0-9_-]*(/.*)?$") {
            return 404 "not found\n";
        }
        proxy_pass https://whatismytip_function/api/v1/web/${FUNCTION_NAMESPACE}/api$request_uri;
        proxy_buffering off;
    }
}
