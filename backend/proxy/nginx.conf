# ──────────────────────────────────────────────────────────────────────
# whatismytip-proxy: thin nginx reverse proxy in front of the FastAPI
# app container.
#
# Phase 4: the FaaS architecture has been retired in favour of a single
# FastAPI process per Phase 1-3.  This proxy is now a pass-through
# (no path rewriting) — it just adds the standard reverse-proxy headers
# the FastAPI middleware stack relies on, exposes a self-contained
# `/healthz` for the orchestrator, and enforces a 10 MiB body limit
# before nginx rejects the request.
#
# Upstream resolution uses App Platform's internal DNS, so the proxy
# talks to the FastAPI component (`fastapi:8000`) over the private
# network — no public round-trip.
# ──────────────────────────────────────────────────────────────────────

upstream fastapi_backend {
    server fastapi:8000;
    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;

    # Generous payload limit — the default 1 MiB is too small for some
    # admin endpoints (e.g. bulk backtest data).
    client_max_body_size 10m;

    # Allow long-running requests (e.g. tip generation, historic
    # refresh) — set well above the FastAPI app's own timeouts so we
    # surface upstream errors rather than connection resets.
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    send_timeout          600s;

    # Standard reverse-proxy headers.
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    # SEC-ME-008: overwrite X-Forwarded-For with the actual remote
    # address (no client-side append).  Using the remote socket
    # address prevents IP-spoofing-based rate-limiter bypass.
    proxy_set_header   X-Forwarded-For   $remote_addr;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # Healthcheck for the proxy itself (does NOT go upstream).  Useful
    # for orchestrator liveness probes without hitting FastAPI.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else forwards to the FastAPI app verbatim.  No
    # path rewriting — the FastAPI routers are mounted at `/api/...`
    # (and the docs at `/docs`, `/openapi.json`, `/redoc`) directly.
    location / {
        proxy_pass http://fastapi_backend;

        # Pass through WebSockets / SSE if we ever need them.
        proxy_buffering off;
    }
}
