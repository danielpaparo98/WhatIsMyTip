# ──────────────────────────────────────────────────────────────────────
# nginx config for whatismytip-proxy.
#
# The public ingress (App Platform) routes `/api/...` to this service on
# port 8080.  We forward those requests to the DigitalOcean Functions
# (Apache OpenWhisk) gateway over HTTPS.
#
# Why HTTPS to the public FaaS gateway, not the App Platform private
# network: the `functions` component in app.yaml is a *serverless*
# (OpenWhisk) component, NOT a regular service.  Serverless components
# don't get a private hostname on the App Platform private network
# (there is no `whatismytip-backend:8080` to dial), so the only way
# to reach them is via the public FaaS gateway URL:
#
#     https://faas.syd1.digitaloceanspaces.com/<NAMESPACE>/api/<package>/<action>/<rest>
#
# The OpenWhisk runtime expects the path
# `/<namespace>/api/<package>/<action>/<rest>`.  With package `api` and
# action `games`, the public URL resolves to
# `https://faas.syd1.digitaloceanspaces.com/<NAMESPACE>/api/api/games/health`.
#
# ── About path stripping ────────────────────────────────────────────────
# App Platform's ingress `prefix` match (as of this writing) does NOT
# preserve the matched prefix on the request forwarded to the component
# when the rule resolves to a service: the proxy receives `/games/health`
# rather than `/api/games/health`.  We handle that by always rewriting
# the upstream path to
# `/<FUNCTION_NAMESPACE>/api/api$request_uri` regardless of whether
# the prefix is present in `$request_uri`.  The trailing `$request_uri`
# includes the leading `/`, so the final path is always
# `/<NAMESPACE>/api/api/<orig-path>`.  (Verified 2026-06-15: the
# `/api/games/health` request was arriving at the proxy as the bare
# path `/games/health` — see fixed in commit fixing the proxy build.)
#
# Environment variables (substituted by the official nginx image's
# `envsubst` on `/etc/nginx/templates/*.template` at container start):
#
#   FUNCTION_HOST         default: faas.syd1.digitaloceanspaces.com
#   FUNCTION_PORT         default: 443
#   FUNCTION_NAMESPACE    REQUIRED  e.g. ap-0a460f0a-a2c8-4d19-8cab-f5636e7e28ff
# ──────────────────────────────────────────────────────────────────────

# Log every request to stdout (so it shows up in `doctl apps logs
# --type run`) — invaluable for debugging routing issues like
# "is the ingress stripping the `/api` prefix?".
# NOTE: `log_format` must be declared in the `http` context (this
# file is included via `include /etc/nginx/conf.d/*.conf;` in the
# main /etc/nginx/nginx.conf, so the top level here IS the http
# context).
log_format proxy_debug '$remote_addr [$time_local] "$request" '
                       '→ $upstream_addr '
                       '$status $body_bytes_sent';

# Upstream: the FaaS gateway.  HTTPS over the public internet.
upstream whatismytip_function {
    server ${FUNCTION_HOST}:${FUNCTION_PORT};
    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;

    # Generous payload limit — the default 1 MiB is too small for some
    # admin endpoints (e.g. bulk backtest data).
    client_max_body_size 10m;

    # Allow long-running requests (e.g. tip generation, historic
    # refresh) — set well above the function component's own timeout
    # so we surface gateway errors rather than connection resets.
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    send_timeout          600s;

    # Standard reverse-proxy headers.
    proxy_http_version 1.1;
    proxy_set_header   Host              ${FUNCTION_HOST};
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # SNI: the FaaS gateway is hosted on Cloudfront/Spaces, which
    # requires SNI to serve the right certificate when we dial by IP
    # or by hostname on :443.
    proxy_ssl_server_name on;
    proxy_ssl_name        ${FUNCTION_HOST};

    # Per-server access log (uses the format defined in the http
    # context above).
    access_log /dev/stdout proxy_debug;

    # Healthcheck for the proxy itself (does NOT go upstream).  Useful
    # for monitoring without hitting the function gateway.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain always;
    }

    # ── Main API forward ─────────────────────────────────────────────
    # Match everything (catches both `/api/...` and the stripped
    # `/...` form that App Platform forwards).  Rewrite the upstream
    # path to `/<NAMESPACE>/api/api$request_uri` so we always end up
    # at the correct OpenWhisk action URL regardless of whether the
    # ingress kept the `/api` prefix or not.
    #
    # Examples (with FUNCTION_NAMESPACE=ap-0a460f0a-a2c8-...):
    #   `/api/games/health`        → `/ap-0a460f0a-.../api/api/api/games/health`
    #                                  (✗ — but this case doesn't actually
    #                                   happen because the ingress strips
    #                                   the prefix)
    #   `/games/health` (stripped)  → `/ap-0a460f0a-.../api/api/games/health`
    #                                  (✓ — matches what OpenWhisk expects)
    location / {
        # 404 anything that doesn't look like an API call
        if ($request_uri !~ "^/(api/)?[a-z][a-z0-9_-]*(/.*)?$") {
            return 404 "not found\n";
        }
        proxy_pass https://whatismytip_function/${FUNCTION_NAMESPACE}/api/api$request_uri;
        proxy_buffering off;
    }
}
