# ──────────────────────────────────────────────────────────────────────
# nginx config for whatismytip-proxy.
#
# The public ingress (App Platform) routes `/api/...` to this service on
# port 8080.  We forward to the function component over the App Platform
# private network using the component name as the hostname — by default
# `${FUNCTION_HOST}=whatismytip-backend` and `${FUNCTION_PORT}=8080`.
#
# The OpenWhisk runtime expects the URL to be
# `/<package>/<action>/<rest>`.  With package `api` and action `games`,
# the runtime resolves `/api/games/health` to the `games` action — so
# the upstream URL we hand to the function gateway is
# `/api/api/games/health`.  nginx appends everything after `/api/...` to
# the upstream's path (note the trailing `/` in `proxy_pass`), so the
# prefix mapping works as expected.
# ──────────────────────────────────────────────────────────────────────

# Upstream: the function component.  Resolved via App Platform's
# internal DNS, so no public round-trip.
upstream whatismytip_function {
    server ${FUNCTION_HOST}:${FUNCTION_PORT};
    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;

    # Generous payload limit — the default 1 MiB is too small for some
    # admin endpoints (e.g. bulk backtest data).
    client_max_body_size 10m;

    # Allow long-running requests (e.g. tip generation, historic
    # refresh) — set well above the function component's own timeout
    # so we surface gateway errors rather than connection resets.
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    send_timeout          600s;

    # Standard reverse-proxy headers.
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # Healthcheck for the proxy itself (does NOT go upstream).  Useful
    # for monitoring without hitting the function gateway.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Main API forward ─────────────────────────────────────────────
    # `/api/games/health` (incoming) →
    # `http://whatismytip-backend:8080/api/api/games/health` (upstream)
    #
    # The trailing `/` after `/api/api` is critical: it tells nginx to
    # replace the matched `/api` prefix with `/api/api` in the
    # upstream request, and append the rest of the path verbatim.
    location /api/ {
        proxy_pass http://whatismytip_function/api/api/;

        # Pass through WebSockets / SSE if we ever need them.
        proxy_buffering off;
    }

    # Anything else (shouldn't happen — ingress already routes `/` to
    # the frontend) returns 404.
    location / {
        return 404 "not found\n";
        add_header Content-Type text/plain;
    }
}
