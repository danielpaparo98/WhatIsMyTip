# ──────────────────────────────────────────────────────────────────────
# whatismytip-proxy: thin nginx reverse proxy in front of the FastAPI
# app container.
#
# Phase 4+: a single FastAPI process per App Platform component. This
# proxy adds the standard reverse-proxy headers the FastAPI middleware
# stack relies on, exposes a self-contained `/healthz` for the
# orchestrator, enforces a 10 MiB body limit, applies defence-in-depth
# security headers (so a single regression in the FastAPI security
# middleware cannot strip them), and applies a per-IP rate limit.
#
# Upstream resolution uses App Platform's internal DNS, so the proxy
# talks to the FastAPI component (`fastapi:8000`) over the private
# network — no public round-trip.
# ──────────────────────────────────────────────────────────────────────

# Per-IP rate limit zone.  10 MB of shared state holds ~160k unique
# 32-byte IPv4 entries.  30 r/s baseline with a 60-request burst is
# generous for our legitimate traffic (cached tip lists) but stops a
# single runaway client from starving the FastAPI container.
limit_req_zone $binary_remote_addr zone=wimt:10m rate=30r/s;

# Upstream keepalive pool.
upstream fastapi_backend {
    server fastapi:8000;
    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;

    # Generous payload limit — the default 1 MiB is too small for some
    # admin endpoints (e.g. bulk backtest data).
    client_max_body_size 10m;

    # Allow long-running requests (e.g. tip generation, historic
    # refresh) — set well above the FastAPI app's own timeouts so we
    # surface upstream errors rather than connection resets.
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    send_timeout          600s;

    # Compression for API responses.  JSON compresses ~5-10x.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        application/xml;

    # Larger response buffers so 50-200 kB JSON payloads don't spill
    # to disk on the hot path.
    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;

    # Standard reverse-proxy headers.
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # Defence-in-depth security headers.  FastAPI also sets these, but
    # we set them here on `always` so even 4xx/5xx responses carry
    # them and a single middleware regression cannot remove them.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # HSTS is only meaningful when the response leaves over HTTPS.
    # Safe to set unconditionally — browsers ignore it on plain HTTP.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Healthcheck for the proxy itself (does NOT go upstream).  Useful
    # for orchestrator liveness probes without hitting FastAPI.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else forwards to the FastAPI app verbatim.  No
    # path rewriting — the FastAPI routers are mounted at `/api/...`
    # (and the docs at `/docs`, `/openapi.json`, `/redoc`) directly.
    location / {
        # Per-IP rate limit.  burst=60 nodelay allows a small spike
        # (e.g. a client loading 3 charts in parallel) without queueing.
        limit_req zone=wimt burst=60 nodelay;

        proxy_pass http://fastapi_backend;
    }
}
