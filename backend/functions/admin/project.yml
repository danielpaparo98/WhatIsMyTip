packages:
  - name: default
    functions:
      - name: admin
        main: ../../packages/api/admin/__init__.py
        runtime: python:3.12
        web: true
        limits:
          timeout: 300000
          memory: 256
        environment:
          DATABASE_URL: ${DATABASE_URL}
          REDIS_URL: ${REDIS_URL}
          CORS_ORIGINS: ${CORS_ORIGINS}
          ENVIRONMENT: ${ENVIRONMENT}
          RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
          RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
          RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS}
          MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES}
          ADMIN_API_KEY: ${ADMIN_API_KEY}
          CRON_DAILY_SYNC: ${CRON_DAILY_SYNC}
          CRON_MATCH_COMPLETION_CHECK: ${CRON_MATCH_COMPLETION_CHECK}
          CRON_TIP_GENERATION: ${CRON_TIP_GENERATION}
          CRON_HISTORICAL_REFRESH: ${CRON_HISTORICAL_REFRESH}
          CRON_ENABLED: ${CRON_ENABLED}
          CRON_TIMEZONE: ${CRON_TIMEZONE}
          CURRENT_SEASON: ${CURRENT_SEASON}
          JOB_TIMEOUT_SECONDS: ${JOB_TIMEOUT_SECONDS}
          JOB_LOCK_EXPIRE_SECONDS: ${JOB_LOCK_EXPIRE_SECONDS}
          JOB_MAX_RETRIES: ${JOB_MAX_RETRIES}
          JOB_RETRY_DELAY_SECONDS: ${JOB_RETRY_DELAY_SECONDS}
          ALERT_ENABLED: ${ALERT_ENABLED}
          ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
          ALERT_EMAIL_RECIPIENTS: ${ALERT_EMAIL_RECIPIENTS}
          ALERT_TIMEOUT_SECONDS: ${ALERT_TIMEOUT_SECONDS}
          METRICS_ENABLED: ${METRICS_ENABLED}
          METRICS_RETENTION_DAYS: ${METRICS_RETENTION_DAYS}
